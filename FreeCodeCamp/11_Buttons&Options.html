<!--Radio Button Checkbox Select Option-->
<html>
  <head>
    <title>Buttons</title>
  </head>
  <body>
    <form action="" method="">
      <input type="radio" name="Superhero" id="" value="Spidey" />Spidey
      <input type="radio" name="Superhero" id="" value="Hulk" />Hulk
      <input type="radio" name="Superhero" id="" value="Captain" />Captain
      <br />
      <br />
      <input type="checkbox" name="Superhero" id="" value="Spidey" />Spidey
      <input type="checkbox" name="Superhero" id="" value="Hulk" />Hulk
      <input type="checkbox" name="Superhero" id="" value="Captain" />Captain
      <br />
      <br />
      <select name="Superhero" id="">
        <option value="Spidey">Spidey</option>
        <option value="Hulk">Hulk</option>
        <option value="Captain">Captain</option>
      </select>
      <br />
      <br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
